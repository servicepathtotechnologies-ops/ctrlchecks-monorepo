name: Deploy Worker

# Triggers:
#   - push to upgrade/phase-0-security-observability or master when worker/ changes
#   - workflow_dispatch for manual deploys / hotfixes
#
# Target: root@187.127.185.105 /opt/ctrlchecks-worker (Hostinger KVM4)
# Domain: https://worker.ctrlchecks.com
#
# Deploy strategy:
#   1. Build dist/ in CI.
#   2. Backup existing dist/ on server (dist.bak/).
#   3. Upload new tar, extract, npm ci, restart service.
#   4. Health-check retry loop: 5 attempts × 10s.
#   5. On failure: restore dist.bak/ + restart + exit 1.

on:
  push:
    branches:
      - master
      - 'upgrade/**'
    paths:
      - 'worker/**'
      - '!worker/**/*.test.ts'
      - '!worker/**/*.md'
  workflow_dispatch:
    inputs:
      skip_quality_gate:
        description: 'Skip type-check + lint (emergency hotfix only)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: deploy-worker
  cancel-in-progress: false   # Never cancel an in-flight deploy

jobs:
  # ── Quality gate ─────────────────────────────────────────────────────────────
  quality-gate:
    name: Worker Quality Gate
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_quality_gate != 'true' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        working-directory: ./worker
        run: npm ci

      - name: Type-check
        working-directory: ./worker
        run: npm run type-check

      - name: Lint
        working-directory: ./worker
        run: npm run lint

  # ── Deploy ───────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy Worker to Hostinger
    runs-on: ubuntu-latest
    needs: quality-gate
    # Run even if quality-gate was skipped (emergency dispatch)
    if: always() && (needs.quality-gate.result == 'success' || needs.quality-gate.result == 'skipped')

    env:
      SERVER_HOST: ${{ secrets.HOSTINGER_HOST || '187.127.185.105' }}
      SERVER_USER: root
      SERVER_PATH: /opt/ctrlchecks-worker

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        working-directory: ./worker
        run: npm ci

      - name: Build worker
        working-directory: ./worker
        run: NODE_OPTIONS="--max-old-space-size=4096" npm run build

      - name: Package dist
        working-directory: ./worker
        run: |
          tar -czf /tmp/worker-deploy.tar.gz \
            dist/ package.json package-lock.json prisma/ public/
          echo "Package size: $(du -sh /tmp/worker-deploy.tar.gz | cut -f1)"

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Upload package to server
        env:
          SSHPASS: ${{ secrets.DEPLOY_PASS }}
        run: |
          sshpass -e scp \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            /tmp/worker-deploy.tar.gz \
            "$SERVER_USER@$SERVER_HOST:/tmp/worker-deploy.tar.gz"

      - name: Deploy on server
        env:
          SSHPASS: ${{ secrets.DEPLOY_PASS }}
        run: |
          sshpass -e ssh \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            "$SERVER_USER@$SERVER_HOST" bash << 'REMOTE'
          set -euo pipefail
          TARGET=/opt/ctrlchecks-worker

          echo "── Backup current dist/ ─────────────────────────────────────"
          if [ -d "$TARGET/dist" ]; then
            rm -rf "$TARGET/dist.bak"
            cp -a "$TARGET/dist" "$TARGET/dist.bak"
            echo "✅ dist.bak created"
          else
            echo "⚠  No existing dist/ — skipping backup (first deploy)"
          fi

          echo "── Extract new package ──────────────────────────────────────"
          tar -xzf /tmp/worker-deploy.tar.gz -C "$TARGET"
          rm /tmp/worker-deploy.tar.gz

          echo "── npm ci ───────────────────────────────────────────────────"
          cd "$TARGET"
          npm ci --omit=dev 2>&1 | tail -5

          echo "── Prisma migrations ────────────────────────────────────────"
          npx prisma migrate deploy 2>&1 | tail -5 || echo "⚠  migrations skipped"

          echo "── Restart service ──────────────────────────────────────────"
          systemctl restart ctrlchecks-worker
          echo "  Waiting 8s for startup..."
          sleep 8
          REMOTE

      - name: Health-check retry loop (5 × 10s)
        env:
          SSHPASS: ${{ secrets.DEPLOY_PASS }}
        run: |
          for attempt in 1 2 3 4 5; do
            echo "Health check attempt $attempt/5..."
            CODE=$(sshpass -e ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
              "$SERVER_USER@$SERVER_HOST" \
              "curl -s -o /dev/null -w '%{http_code}' http://localhost:3001/health/live" 2>/dev/null || echo "000")
            echo "  HTTP $CODE"
            if [ "$CODE" = "200" ]; then
              echo "✅ Health check passed on attempt $attempt"
              exit 0
            fi
            if [ "$attempt" -lt 5 ]; then
              echo "  Waiting 10s before retry..."
              sleep 10
            fi
          done
          echo "❌ Health check failed after 5 attempts — initiating rollback"
          exit 1

      - name: Rollback on health-check failure
        if: failure()
        env:
          SSHPASS: ${{ secrets.DEPLOY_PASS }}
        run: |
          echo "── Rolling back to previous dist.bak/ ───────────────────────"
          sshpass -e ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "$SERVER_USER@$SERVER_HOST" bash << 'ROLLBACK'
          set -euo pipefail
          TARGET=/opt/ctrlchecks-worker
          if [ -d "$TARGET/dist.bak" ]; then
            rm -rf "$TARGET/dist"
            cp -a "$TARGET/dist.bak" "$TARGET/dist"
            systemctl restart ctrlchecks-worker
            sleep 8
            CODE=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3001/health/live)
            if [ "$CODE" = "200" ]; then
              echo "✅ Rollback successful — previous version restored"
            else
              echo "❌ Rollback health check also failed (HTTP $CODE). Manual intervention needed."
            fi
          else
            echo "⚠  No dist.bak/ available — cannot rollback. Manual restore needed."
          fi
          ROLLBACK
          exit 1   # Always fail the job so the team is alerted
